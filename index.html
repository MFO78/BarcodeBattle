<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="AF_logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Barcode Battler</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- FontAwesome for UI Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
        
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .rolling { animation: roll 0.3s ease-in-out; }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
        }
        .damage-text { position: absolute; font-weight: 900; font-size: 2rem; animation: floatUp 0.8s forwards; pointer-events: none; z-index: 50; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .dmg-crit { color: #f59e0b; } 
        .dmg-miss { color: #94a3b8; font-size: 1.25rem; } 
        .dmg-normal { color: #ef4444; } 

        /* Strict SVG Downscaling */
        .hero-container { height: 6rem; width: 100%; display: flex; justify-content: center; position: relative; }
        .hero-svg { height: 100%; width: auto; object-fit: contain; filter: drop-shadow(0 5px 5px rgb(0 0 0 / 0.5)); transition: transform 0.15s; }
        
        .hero-container.attacking { transform: translateX(20px) scale(1.05); }
        .hero-container.attacking-reverse { transform: translateX(-20px) scale(1.05); }
        .hero-container.hit { filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(3); }
        
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        #reader__scan_region img { display: none; } 
        
        .stat-badge { display: flex; align-items: center; gap: 0.25rem; background-color: rgba(30, 41, 59, 0.9); border: 1px solid rgba(71, 85, 105, 0.5); border-radius: 0.375rem; padding: 0.25rem 0.5rem; font-family: monospace; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-[100dvh] w-screen overflow-hidden flex justify-center items-center">

    <div id="app" class="w-full max-w-md h-[100dvh] bg-slate-800 shadow-2xl relative flex flex-col">
        
        <!-- Header -->
        <header class="bg-slate-950 p-3 flex justify-between items-center border-b border-slate-700 shrink-0">
            <h1 class="text-lg font-bold text-amber-400"><i class="fa-solid fa-barcode mr-2"></i>Code Battler</h1>
            <span class="text-xs font-mono text-green-400">Local Mode</span>
        </header>

        <!-- SCREEN: Main Menu -->
        <main id="screen-menu" class="screen active flex-1 p-5 flex-col justify-center overflow-y-auto">
            <div class="text-center mb-4 shrink-0 mt-2">
                <i class="fa-solid fa-qrcode text-5xl text-amber-500 mb-2"></i>
                <h2 class="text-xl font-bold">Scan & Fight</h2>
            </div>

            <!-- Current Hero Display -->
            <div id="currentHeroPreview" class="hidden w-full bg-slate-700 rounded-xl p-3 flex-col items-center border border-slate-600 shadow-inner shrink-0 mb-4">
                <h3 class="text-xs text-slate-300 mb-2 font-bold uppercase tracking-wider">Player 1 Ready</h3>
                <div id="menuHeroVisual" class="h-16 w-16 mb-2"></div>
                <div class="flex justify-center gap-3 text-[10px] font-mono text-amber-300 w-full bg-slate-800 p-2 rounded-lg">
                    <span><i class="fa-solid fa-heart text-red-500"></i> <span id="menuHeroHP"></span></span>
                    <span><i class="fa-solid fa-hand-fist text-orange-500"></i> <span id="menuHeroSTR"></span></span>
                    <span><i class="fa-solid fa-shield text-blue-500"></i> <span id="menuHeroDEF"></span></span>
                    <span><i class="fa-solid fa-bolt text-yellow-500"></i> <span id="menuHeroSPD"></span></span>
                </div>
            </div>

            <div class="w-full space-y-3 mt-auto shrink-0 pb-2">
                <button onclick="app.prepScan('p1')" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <i class="fa-solid fa-camera"></i> Scan P1 Hero
                </button>
                
                <div class="grid grid-cols-2 gap-3 w-full">
                    <button onclick="app.startMatchmaking('cpu')" id="btnVsCpu" disabled class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl active:scale-95 transition-transform disabled:opacity-50 flex flex-col items-center">
                        <i class="fa-solid fa-robot mb-1 text-lg"></i> Vs CPU
                    </button>
                    <button onclick="app.prepScan('p2')" id="btnPassPlay" disabled class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-xl active:scale-95 transition-transform disabled:opacity-50 flex flex-col items-center">
                        <i class="fa-solid fa-mobile-screen-button mb-1 text-lg"></i> Pass & Play
                    </button>
                </div>
            </div>
        </main>

        <!-- SCREEN: Scanner -->
        <main id="screen-scanner" class="screen flex-1 flex-col bg-black">
            <div class="p-3 bg-slate-900 flex justify-between items-center shrink-0">
                <h2 class="font-bold text-sm" id="scannerTitle">Scan Code</h2>
                <button onclick="app.stopScannerAndReturn()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div id="cameraSelectorContainer" class="hidden bg-slate-800 p-2 border-b border-slate-700 shrink-0">
                <select id="cameraSelect" onchange="app.changeCamera(this.value)" class="w-full bg-slate-900 text-xs text-white p-2 rounded border border-slate-600 focus:border-amber-500 outline-none">
                    <option value="">Loading cameras...</option>
                </select>
            </div>

            <div class="flex-1 relative flex items-center justify-center bg-slate-950 overflow-hidden min-h-[250px]">
                <div id="reader"></div>
            </div>
            
            <div class="p-3 bg-slate-900 shrink-0 border-t border-slate-800 pb-4">
                <div class="flex gap-2">
                    <input type="text" id="manualCode" placeholder="Mock code..." class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-2 text-xs text-white focus:outline-none focus:border-amber-500">
                    <button onclick="app.handleScan(document.getElementById('manualCode').value)" class="bg-amber-600 px-3 py-2 rounded-lg font-bold text-xs">Simulate</button>
                </div>
            </div>
        </main>

        <!-- SCREEN: Hero Reveal -->
        <main id="screen-reveal" class="screen flex-1 p-5 flex-col justify-center items-center overflow-y-auto">
            <h2 class="text-2xl font-bold text-amber-400 mb-4 text-center shrink-0" id="revealTitle">Hero Discovered!</h2>
            
            <div class="bg-slate-800 border-2 border-slate-700 rounded-2xl p-5 w-full max-w-sm flex flex-col items-center shadow-2xl relative shrink-0">
                <div id="revealVisual" class="w-32 h-32 mb-4 relative z-10"></div>
                <h3 id="revealName" class="text-xl font-bold mb-3 z-10 font-mono tracking-wider"></h3>
                
                <div class="grid grid-cols-2 gap-2 w-full z-10">
                    <div class="stat-badge justify-between"><span class="text-slate-400 text-[10px]">HP (Stamina)</span><span id="revealHP" class="text-green-400 font-bold"></span></div>
                    <div class="stat-badge justify-between"><span class="text-slate-400 text-[10px]">STR (Attack)</span><span id="revealSTR" class="text-orange-400 font-bold"></span></div>
                    <div class="stat-badge justify-between"><span class="text-slate-400 text-[10px]">DEF (Armor)</span><span id="revealDEF" class="text-blue-400 font-bold"></span></div>
                    <div class="stat-badge justify-between"><span class="text-slate-400 text-[10px]">SPD (Speed)</span><span id="revealSPD" class="text-yellow-400 font-bold"></span></div>
                </div>
            </div>

            <div id="revealActionContainer" class="flex flex-col gap-2 w-full mt-6 shrink-0 pb-4">
                <!-- Dynamically populated -->
            </div>
        </main>

        <!-- SCREEN: Battle -->
        <main id="screen-battle" class="screen flex-1 flex-col relative bg-slate-900 overflow-hidden">
            <!-- Top HUD: Enemy -->
            <div class="bg-slate-950 p-3 flex justify-between items-center border-b border-red-900/50 shrink-0 z-20 shadow-md">
                <div class="flex flex-col w-1/3">
                    <span id="enemyName" class="text-[10px] font-mono text-red-400 uppercase font-bold tracking-widest">Player 2</span>
                    <span class="text-xs font-bold" id="enemyHpText">0 / 0</span>
                </div>
                <div class="w-2/3 bg-slate-800 h-4 rounded-full overflow-hidden border border-slate-700">
                    <div id="enemyHpBar" class="bg-red-500 h-full w-full transition-all duration-300"></div>
                </div>
            </div>

            <!-- Battle Arena: Restructured as standard flex-col to prevent overlapping -->
            <div class="flex-1 flex flex-col justify-evenly p-3 z-10 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-slate-900">
                
                <!-- Enemy Tier -->
                <div class="flex flex-col items-center">
                    <div id="enemyVisual" class="hero-container"></div>
                    <!-- Enemy Live Stats -->
                    <div class="flex gap-2 mt-2">
                        <div class="stat-badge"><span class="text-[10px] text-orange-400"><i class="fa-solid fa-hand-fist"></i> <span id="batEnemySTR"></span></span></div>
                        <div class="stat-badge"><span class="text-[10px] text-blue-400"><i class="fa-solid fa-shield"></i> <span id="batEnemyDEF"></span></span></div>
                        <div class="stat-badge"><span class="text-[10px] text-yellow-400"><i class="fa-solid fa-bolt"></i> <span id="batEnemySPD"></span></span></div>
                    </div>
                </div>
                
                <!-- Center Tier: Dice & Mechanics -->
                <div class="flex flex-col items-center justify-center py-2 z-30">
                    <div class="bg-slate-900/95 px-6 py-3 rounded-2xl border border-slate-700 shadow-xl flex flex-col items-center">
                        <span id="turnIndicator" class="text-[10px] font-bold text-amber-400 mb-2 uppercase tracking-widest">P1 Turn</span>
                        <div id="diceDisplay" class="w-14 h-14 bg-white rounded-xl shadow-inner flex items-center justify-center text-3xl font-bold text-slate-900 border-4 border-slate-300 mb-2">
                            <i class="fa-solid fa-dice-d6"></i>
                        </div>
                        <span id="actionText" class="text-[11px] font-bold text-white h-4 mb-2">Prepare to fight!</span>
                        
                        <!-- Combat Mechanic Explanation -->
                        <div class="text-[9px] text-slate-400 text-center max-w-[200px] leading-tight border-t border-slate-700 pt-2">
                            <span class="text-amber-500 font-bold">DMG</span> = (STR × [Roll/2]) - Enemy DEF.<br>
                            Higher <span class="text-yellow-500 font-bold">SPD</span> boosts Evade & Crit chance.
                        </div>
                    </div>
                </div>

                <!-- Player Tier -->
                <div class="flex flex-col items-center">
                    <!-- Player Live Stats -->
                    <div class="flex gap-2 mb-2">
                        <div class="stat-badge"><span class="text-[10px] text-orange-400"><i class="fa-solid fa-hand-fist"></i> <span id="batPlayerSTR"></span></span></div>
                        <div class="stat-badge"><span class="text-[10px] text-blue-400"><i class="fa-solid fa-shield"></i> <span id="batPlayerDEF"></span></span></div>
                        <div class="stat-badge"><span class="text-[10px] text-yellow-400"><i class="fa-solid fa-bolt"></i> <span id="batPlayerSPD"></span></span></div>
                    </div>
                    <div id="playerVisual" class="hero-container transform scale-x-[-1]"></div>
                </div>
            </div>

            <!-- Bottom HUD: Player 1 & Action Button -->
            <div class="bg-slate-950 p-3 pb-5 border-t border-slate-800 shrink-0 z-20 shadow-[0_-10px_15px_rgba(0,0,0,0.3)]">
                <div class="flex justify-between items-center mb-3">
                    <div class="w-2/3 bg-slate-800 h-4 rounded-full overflow-hidden border border-slate-700">
                        <div id="playerHpBar" class="bg-green-500 h-full w-full transition-all duration-300"></div>
                    </div>
                    <div class="flex flex-col text-right w-1/3">
                        <span class="text-[10px] font-mono text-green-400 uppercase font-bold tracking-widest">Player 1</span>
                        <span class="text-xs font-bold" id="playerHpText">0 / 0</span>
                    </div>
                </div>
                
                <button id="btnRollDice" onclick="app.executeTurn()" class="w-full bg-green-600 hover:bg-green-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2 text-base">
                    <i class="fa-solid fa-dice"></i> <span id="btnRollText">Toss Dice & Attack</span>
                </button>
            </div>
        </main>

        <!-- Modal: Battle Result -->
        <div id="modalResult" class="absolute inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center p-6 backdrop-blur-md">
            <h2 id="resultTitle" class="text-5xl font-bold mb-4 uppercase italic tracking-tighter text-center text-yellow-400">Victory!</h2>
            <p id="resultDesc" class="text-slate-300 mb-8 text-center text-sm px-4"></p>
            <button onclick="app.concludeBattle()" class="w-full max-w-xs bg-amber-600 py-3 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
                Return to Menu
            </button>
        </div>

    </div>

    <script>
        const Utils = {
            hashString: (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash |= 0; 
                }
                const seed = Math.abs(hash);
                return [
                    (seed >> 24) & 255, (seed >> 16) & 255, (seed >> 8) & 255, seed & 255,
                    (seed * 13 >> 16) & 255, (seed * 17 >> 8) & 255, (seed * 23) & 255, (seed * 31 >> 4) & 255
                ];
            },
            rollDie: () => Math.floor(Math.random() * 6) + 1,
            sleep: (ms) => new Promise(resolve => setTimeout(resolve, ms)),
            generateCode: () => Math.floor(100000 + Math.random() * 900000).toString()
        };

        const SvgGenerator = {
            heads: [
                `<rect x="35" y="10" width="30" height="30" rx="4" fill="currentColor"/><path d="M40 25 h20 M50 25 v15" stroke="#1e293b" stroke-width="2"/>`,
                `<polygon points="50,5 30,35 70,35" fill="currentColor"/><circle cx="50" cy="25" r="5" fill="#1e293b"/>`,
                `<circle cx="50" cy="25" r="18" fill="currentColor"/><rect x="40" y="20" width="20" height="8" rx="4" fill="#1e293b"/>`
            ],
            bodies: [
                `<rect x="25" y="40" width="50" height="40" rx="8" fill="currentColor"/><path d="M25 50 h50 M25 70 h50" stroke="#1e293b" stroke-width="2"/>`,
                `<polygon points="50,40 20,80 80,80" fill="currentColor"/><circle cx="50" cy="60" r="10" fill="#1e293b"/>`,
                `<rect x="35" y="40" width="30" height="50" rx="15" fill="currentColor"/><rect x="45" y="55" width="10" height="20" fill="#38bdf8"/>`
            ],
            weapons: [
                `<rect x="80" y="30" width="6" height="50" fill="#94a3b8"/><rect x="75" y="60" width="16" height="6" fill="currentColor"/>`,
                `<rect x="80" y="30" width="6" height="60" fill="#78350f"/><path d="M86 40 Q 100 40 100 55 Q 100 70 86 70 Z" fill="currentColor"/>`,
                `<rect x="80" y="20" width="4" height="70" fill="#78350f"/><circle cx="82" cy="20" r="8" fill="currentColor"/>`
            ],
            arms: `<rect x="15" y="45" width="10" height="25" rx="5" fill="currentColor"/><rect x="75" y="45" width="10" height="25" rx="5" fill="currentColor"/>`,
            legs: `<rect x="35" y="80" width="10" height="15" fill="currentColor"/><rect x="55" y="80" width="10" height="15" fill="currentColor"/>`,
            
            build: (hashArray) => {
                const head = SvgGenerator.heads[hashArray[4] % 3];
                const body = SvgGenerator.bodies[hashArray[5] % 3];
                const weapon = SvgGenerator.weapons[hashArray[6] % 3];
                const hue = hashArray[7];
                return `<svg viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg" class="hero-svg" style="color: hsl(${hue}, 70%, 50%);">${SvgGenerator.arms}${SvgGenerator.legs}${body}${head}${weapon}</svg>`;
            }
        };

        class Hero {
            constructor(code, isCpu = false) {
                this.code = code;
                const hash = Utils.hashString(code);
                this.maxHp = 50 + Math.floor((hash[0] / 255) * 100);
                this.hp = this.maxHp;
                this.str = 10 + Math.floor((hash[1] / 255) * 20); // 10-30
                this.def = 5 + Math.floor((hash[2] / 255) * 15); // 5-20
                this.spd = 5 + Math.floor((hash[3] / 255) * 15); // 5-20
                this.svg = SvgGenerator.build(hash);
                this.name = isCpu ? "CPU-" + code.toString().substring(0, 4).toUpperCase() : "U-" + code.toString().substring(0, 4).toUpperCase();
            }
        }

        const GameController = {
            p1Hero: null, p2Hero: null, html5QrcodeScanner: null,
            battleMode: 'cpu', isProcessingScan: false, scanningContext: 'p1', 
            currentTurn: 1, battleActive: false,

            init: () => { GameController.showScreen('menu'); },
            showScreen: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + id).classList.add('active');
            },

            // --- SCANNER ---
            prepScan: (context) => {
                GameController.scanningContext = context;
                document.getElementById('scannerTitle').innerText = context === 'p1' ? "Scan P1 Hero" : "Scan P2 Hero";
                GameController.showScreen('scanner');
                GameController.initHardwareScanner();
            },

            initHardwareScanner: () => {
                if (typeof Html5Qrcode === 'undefined') return;
                Html5Qrcode.getCameras().then(devices => {
                    if (devices && devices.length) {
                        const selectEl = document.getElementById('cameraSelect');
                        selectEl.innerHTML = '';
                        let bestCameraId = devices[0].id;
                        
                        devices.forEach(camera => {
                            const opt = document.createElement('option');
                            opt.value = camera.id;
                            const label = camera.label || `Camera ${camera.id.substring(0, 5)}...`;
                            opt.text = label;
                            selectEl.appendChild(opt);
                            if (label.toLowerCase().includes('back') || label.toLowerCase().includes('environment') || label.toLowerCase().includes('0')) {
                                bestCameraId = camera.id;
                            }
                        });
                        
                        if (devices.length > 1) document.getElementById('cameraSelectorContainer').classList.remove('hidden');
                        selectEl.value = bestCameraId;
                        GameController.startScanner(bestCameraId);
                    }
                }).catch(() => GameController.startScanner(null));
            },

            changeCamera: async (deviceId) => {
                await GameController.stopScannerInternal();
                GameController.startScanner(deviceId);
            },

            startScanner: (cameraId) => {
                if (!GameController.html5QrcodeScanner) GameController.html5QrcodeScanner = new Html5Qrcode("reader");
                GameController.isProcessingScan = false;
                
                const config = { fps: 10, qrbox: { width: 300, height: 150 }, formatsToSupport: [0, 1, 3, 4, 8] }; 
                const cameraConfig = cameraId ? { deviceId: { exact: cameraId } } : { facingMode: "environment" };
                
                GameController.html5QrcodeScanner.start(
                    cameraConfig, config, (decodedText) => GameController.handleScan(decodedText), () => {} 
                ).catch(err => console.error(err));
            },

            stopScannerInternal: async () => {
                if (GameController.html5QrcodeScanner && GameController.html5QrcodeScanner.isScanning) {
                    await GameController.html5QrcodeScanner.stop();
                    GameController.html5QrcodeScanner.clear();
                }
            },

            stopScannerAndReturn: async () => {
                await GameController.stopScannerInternal();
                GameController.showScreen('menu');
            },

            handleScan: async (code) => {
                if(!code || GameController.isProcessingScan) return;
                GameController.isProcessingScan = true; 
                await GameController.stopScannerInternal(); 
                
                const h = new Hero(code);
                
                document.getElementById('revealTitle').innerText = GameController.scanningContext === 'p1' ? "P1 Hero Found!" : "P2 Hero Found!";
                document.getElementById('revealVisual').innerHTML = h.svg;
                document.getElementById('revealName').innerText = h.name;
                
                document.getElementById('revealHP').innerText = h.hp;
                document.getElementById('revealSTR').innerText = h.str;
                document.getElementById('revealDEF').innerText = h.def;
                document.getElementById('revealSPD').innerText = h.spd;
                
                const container = document.getElementById('revealActionContainer');
                if (GameController.scanningContext === 'p1') {
                    GameController.p1TempHero = h;
                    container.innerHTML = `<button onclick="app.keepP1Hero()" class="w-full bg-green-600 py-3 rounded-xl font-bold">Keep Hero & Return</button>`;
                } else {
                    GameController.p2Hero = h;
                    container.innerHTML = `<button onclick="app.startMatchmaking('local')" class="w-full bg-red-600 py-3 rounded-xl font-bold">Start Local Battle!</button>`;
                }
                
                GameController.showScreen('reveal');
                GameController.isProcessingScan = false;
            },

            keepP1Hero: () => {
                GameController.p1Hero = GameController.p1TempHero;
                document.getElementById('btnVsCpu').disabled = false;
                document.getElementById('btnPassPlay').disabled = false;
                
                document.getElementById('currentHeroPreview').classList.remove('hidden');
                document.getElementById('currentHeroPreview').classList.add('flex');
                document.getElementById('menuHeroVisual').innerHTML = GameController.p1Hero.svg;
                document.getElementById('menuHeroHP').innerText = GameController.p1Hero.hp;
                document.getElementById('menuHeroSTR').innerText = GameController.p1Hero.str;
                document.getElementById('menuHeroDEF').innerText = GameController.p1Hero.def;
                document.getElementById('menuHeroSPD').innerText = GameController.p1Hero.spd;
                
                GameController.showScreen('menu');
            },

            // --- BATTLE ENGINE ---
            startMatchmaking: (type) => {
                GameController.battleMode = type;
                GameController.battleActive = true;
                
                if (type === 'cpu') {
                    const cpuCode = Utils.generateCode();
                    GameController.p2Hero = new Hero(cpuCode, true);
                    GameController.p2Hero.maxHp = GameController.p1Hero.maxHp + (Math.floor(Math.random()*20)-10);
                    GameController.p2Hero.hp = GameController.p2Hero.maxHp;
                    document.getElementById('enemyName').innerText = "CPU";
                    document.getElementById('enemyName').className = "text-[10px] font-mono text-slate-400 uppercase font-bold tracking-widest";
                } else {
                    document.getElementById('enemyName').innerText = "Player 2";
                    document.getElementById('enemyName').className = "text-[10px] font-mono text-red-400 uppercase font-bold tracking-widest";
                }
                
                GameController.currentTurn = GameController.p1Hero.spd >= GameController.p2Hero.spd ? 1 : 2;
                GameController.initBattleUI();
                GameController.showScreen('battle');
                GameController.processTurnStart();
            },

            initBattleUI: () => {
                document.getElementById('playerVisual').innerHTML = GameController.p1Hero.svg;
                document.getElementById('enemyVisual').innerHTML = GameController.p2Hero.svg;
                
                // Populate Battle HUD Stats
                document.getElementById('batPlayerSTR').innerText = GameController.p1Hero.str;
                document.getElementById('batPlayerDEF').innerText = GameController.p1Hero.def;
                document.getElementById('batPlayerSPD').innerText = GameController.p1Hero.spd;
                
                document.getElementById('batEnemySTR').innerText = GameController.p2Hero.str;
                document.getElementById('batEnemyDEF').innerText = GameController.p2Hero.def;
                document.getElementById('batEnemySPD').innerText = GameController.p2Hero.spd;

                GameController.updateHpBars();
                document.getElementById('actionText').innerText = "Ready!";
                document.getElementById('diceDisplay').innerHTML = `<i class="fa-solid fa-dice-d6"></i>`;
            },

            updateHpBars: () => {
                const p1 = GameController.p1Hero;
                const p2 = GameController.p2Hero;
                document.getElementById('playerHpText').innerText = `${Math.max(0, p1.hp)} / ${p1.maxHp}`;
                document.getElementById('enemyHpText').innerText = `${Math.max(0, p2.hp)} / ${p2.maxHp}`;
                document.getElementById('playerHpBar').style.width = `${Math.max(0, (p1.hp / p1.maxHp) * 100)}%`;
                document.getElementById('enemyHpBar').style.width = `${Math.max(0, (p2.hp / p2.maxHp) * 100)}%`;
            },

            showDamageText: (targetId, txt, type) => {
                const target = document.getElementById(targetId);
                const dmgEl = document.createElement('div');
                dmgEl.className = `damage-text ${type}`;
                dmgEl.innerText = txt;
                target.appendChild(dmgEl);
                setTimeout(() => dmgEl.remove(), 800);
                
                if (type !== 'dmg-miss') {
                    target.querySelector('svg').classList.add('hit');
                    setTimeout(() => target.querySelector('svg').classList.remove('hit'), 150);
                }
            },

            animateAttack: async (attackerId) => {
                const el = document.getElementById(attackerId);
                const attackClass = attackerId === 'playerVisual' ? 'attacking' : 'attacking-reverse';
                el.classList.add(attackClass);
                await Utils.sleep(150);
                el.classList.remove(attackClass);
                await Utils.sleep(100);
            },

            processTurnStart: async () => {
                if(!GameController.battleActive) return;
                const btn = document.getElementById('btnRollDice');
                const btnText = document.getElementById('btnRollText');
                const indicator = document.getElementById('turnIndicator');
                
                if (GameController.currentTurn === 1) {
                    btn.disabled = false;
                    btn.className = "w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2 text-base";
                    btnText.innerText = "P1: Toss Dice & Attack";
                    indicator.innerText = "P1 Turn";
                    indicator.className = "text-[10px] font-bold text-green-400 mb-2 uppercase tracking-widest";
                } else {
                    if (GameController.battleMode === 'cpu') {
                        btn.disabled = true;
                        btn.className = "w-full bg-slate-700 text-slate-500 font-bold py-3 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2 text-base";
                        btnText.innerText = "CPU is acting...";
                        indicator.innerText = "CPU Turn";
                        indicator.className = "text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest";
                        GameController.executeTurnLogic(false); 
                    } else {
                        btn.disabled = false;
                        btn.className = "w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2 text-base";
                        btnText.innerText = "P2: Toss Dice & Attack";
                        indicator.innerText = "P2 Turn";
                        indicator.className = "text-[10px] font-bold text-red-400 mb-2 uppercase tracking-widest";
                    }
                }
            },

            executeTurn: () => {
                if(!GameController.battleActive) return;
                document.getElementById('btnRollDice').disabled = true;
                GameController.executeTurnLogic(true); 
            },

            executeTurnLogic: async (isHuman) => {
                const isP1 = GameController.currentTurn === 1;
                if (!isHuman) await Utils.sleep(600); // CPU think time
                
                const diceEl = document.getElementById('diceDisplay');
                diceEl.classList.add('rolling');
                document.getElementById('actionText').innerText = "Rolling...";
                
                await Utils.sleep(300); // Fast animation
                const roll = Utils.rollDie();
                diceEl.classList.remove('rolling');
                diceEl.innerHTML = roll;
                
                const attacker = isP1 ? GameController.p1Hero : GameController.p2Hero;
                const defender = isP1 ? GameController.p2Hero : GameController.p1Hero;
                const attackerVisual = isP1 ? 'playerVisual' : 'enemyVisual';
                const defenderVisual = isP1 ? 'enemyVisual' : 'playerVisual';
                
                // Mathematical Core: Roll acts as fractional multiplier (e.g., 4 = 2.0x, 1 = 0.5x)
                const mult = roll / 2; 
                // Speed differential dictates evasion/crit
                const spdAdvantage = (attacker.spd / defender.spd) * roll; 
                
                let finalDmg = 0;
                let txtType = 'dmg-normal';
                let displayTxt = '';
                
                await GameController.animateAttack(attackerVisual);

                if (spdAdvantage < 1.2 && roll <= 2) {
                    // Evasion via high defender SPD / low roll
                    txtType = 'dmg-miss';
                    displayTxt = 'EVADED!';
                    document.getElementById('actionText').innerText = `Rolled ${roll}. Enemy Evaded!`;
                } else if (spdAdvantage >= 4.0 && roll >= 5) {
                    // Critical hit (bypasses DEF) via high attacker SPD / high roll
                    finalDmg = Math.floor(attacker.str * mult);
                    txtType = 'dmg-crit';
                    displayTxt = `CRIT -${finalDmg}`;
                    document.getElementById('actionText').innerText = `CRITICAL ROLL ${roll}!`;
                } else {
                    // Standard hit calculation
                    finalDmg = Math.max(1, Math.floor((attacker.str * mult) - defender.def));
                    displayTxt = `-${finalDmg}`;
                    document.getElementById('actionText').innerText = `Rolled ${roll}. Deals ${finalDmg} DMG.`;
                }
                
                GameController.showDamageText(defenderVisual, displayTxt, txtType);
                defender.hp -= finalDmg;
                GameController.updateHpBars();
                
                await Utils.sleep(800); 

                if (defender.hp <= 0) {
                    GameController.endBattle(isP1 ? 'p1' : 'p2');
                } else {
                    GameController.currentTurn = isP1 ? 2 : 1;
                    GameController.processTurnStart();
                }
            },

            endBattle: (winner) => {
                GameController.battleActive = false;
                const modal = document.getElementById('modalResult');
                const title = document.getElementById('resultTitle');
                const desc = document.getElementById('resultDesc');
                
                modal.classList.replace('hidden', 'flex');
                
                if (winner === 'p1') {
                    title.innerText = "P1 VICTORY!";
                    title.className = "text-4xl font-bold mb-4 uppercase italic tracking-tighter text-green-400 text-center";
                    desc.innerText = "Player 1's hero survives to fight another day.";
                    if(GameController.p1Hero) GameController.p1Hero.hp = GameController.p1Hero.maxHp;
                } else if (winner === 'p2') {
                    title.innerText = "P2 VICTORY!";
                    title.className = "text-4xl font-bold mb-4 uppercase italic tracking-tighter text-red-500 text-center";
                    desc.innerText = GameController.battleMode === 'cpu' ? "The CPU destroyed you." : "Player 2 destroyed Player 1.";
                    GameController.clearP1();
                }
            },
            
            clearP1: () => {
                GameController.p1Hero = null;
                document.getElementById('currentHeroPreview').classList.add('hidden');
                document.getElementById('currentHeroPreview').classList.remove('flex');
                document.getElementById('btnVsCpu').disabled = true;
                document.getElementById('btnPassPlay').disabled = true;
            },
            
            concludeBattle: () => {
                document.getElementById('modalResult').classList.replace('flex', 'hidden');
                GameController.p2Hero = null; 
                GameController.showScreen('menu');
            }
        };

        window.app = GameController;
        window.onload = () => { GameController.init(); };
    </script>
</body>
</html>
