<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Barcode Battler - Hardened</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        #reader { width: 100%; min-height: 300px; display: block; overflow: hidden; }
        .screen { display: none; }
        .active { display: flex !important; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans h-[100dvh] overflow-hidden">
    <div id="app" class="h-full w-full flex flex-col relative">
        <main id="screen-menu" class="screen active flex-1 items-center justify-center p-6">
            <h1 class="text-2xl font-bold mb-6">Barcode Battler</h1>
            <button onclick="app.prepScan('p1')" class="w-full bg-amber-600 py-6 rounded-xl font-bold">Start Scan</button>
        </main>
        <main id="screen-scanner" class="screen flex-1 bg-black">
            <div id="reader"></div>
            <button onclick="app.closeScanner()" class="bg-red-800 py-6 font-bold">Close Scanner</button>
        </main>
    </div>

    <script>
        const App = {
            scanner: null,
            showScreen: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + id).classList.add('active');
            },
            prepScan: async (ctx) => {
                App.showScreen('scanner');
                if (!App.scanner) App.scanner = new Html5Qrcode("reader");
                
                try {
                    await App.scanner.start(
                        { facingMode: { exact: "environment" } },
                        { fps: 15, qrbox: { width: 250, height: 150 } },
                        (d) => { App.handleScan(d); },
                        (err) => {}
                    );
                } catch(e) {
                    // Fallback to basic mode if specific constraint fails
                    App.scanner.start({ facingMode: "environment" }, { fps: 10 }, (d) => App.handleScan(d));
                }
            },
            handleScan: async (code) => {
                await App.closeScanner();
                alert("Result: " + code);
            },
            closeScanner: async () => {
                if (App.scanner?.isScanning) {
                    await App.scanner.stop();
                    App.scanner.clear();
                }
                App.showScreen('menu');
            }
        };
        window.app = App;
    </script>
</body>
</html>
