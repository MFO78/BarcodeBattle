<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Code Battler - Scanner Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
        #reader { width: 100%; height: 300px; display: block; }
        #reader video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-hidden">
    <div id="app" class="h-[100dvh] w-full flex flex-col">
        <!-- Screens -->
        <main id="screen-menu" class="screen active flex-1 items-center justify-center">
            <h1 class="text-3xl font-bold mb-8">Barcode Battler</h1>
            <button onclick="app.prepScan('p1')" class="bg-amber-600 p-6 rounded-lg w-4/5 font-bold">Scan P1</button>
        </main>

        <main id="screen-scanner" class="screen flex-1 bg-black">
            <div id="reader"></div>
            <button onclick="app.closeScanner()" class="p-6 bg-red-800 text-white font-bold">Stop Scanner</button>
        </main>
        
        <main id="screen-battle" class="screen flex-1 items-center justify-center">
            <h2 class="text-2xl font-bold">Battle Active</h2>
            <button onclick="app.executeTurn()" class="bg-green-600 p-6 rounded-lg">Attack!</button>
        </main>
    </div>

    <script>
        const App = {
            scanner: null,
            init: () => { App.showScreen('menu'); },
            showScreen: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + id).classList.add('active');
            },
            prepScan: (ctx) => {
                App.ctx = ctx;
                App.showScreen('scanner');
                // Singleton instantiation
                if (!App.scanner) App.scanner = new Html5Qrcode("reader");
                
                App.scanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: 200 },
                    (d) => App.handleScan(d),
                    (err) => { /* Suppress noisy errors */ }
                ).catch(err => {
                    console.error("Scanner startup failed", err);
                    alert("Scanner failed. Please check permissions.");
                });
            },
            handleScan: (code) => {
                App.closeScanner();
                alert("Scanned: " + code);
                App.showScreen('battle');
            },
            closeScanner: async () => {
                if (App.scanner && App.scanner.isScanning) {
                    await App.scanner.stop();
                }
                App.showScreen('menu');
            },
            executeTurn: () => {
                alert("Attack Successful!");
                App.showScreen('menu');
            }
        };
        window.app = App;
        window.onload = App.init;
    </script>
</body>
</html>
